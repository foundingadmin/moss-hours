<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moss · Hours Report</title>
  <link rel="icon" href="https://brand.foundingcreative.com/favicon.svg" />

  <style>
    /* ── Founding Creative brand typefaces (hosted on the design-system site) ── */
    @font-face {
      font-family: 'Gelica'; font-style: normal; font-weight: 500; font-display: swap;
      src: url('https://brand.foundingcreative.com/fonts/Gelica-Medium.otf') format('opentype');
    }
    @font-face {
      font-family: 'Gelica'; font-style: normal; font-weight: 600; font-display: swap;
      src: url('https://brand.foundingcreative.com/fonts/Gelica-SemiBold.otf') format('opentype');
    }
    @font-face {
      font-family: 'Manrope'; font-style: normal; font-weight: 200 800; font-display: swap;
      src: url('https://brand.foundingcreative.com/fonts/Manrope-VariableFont_wght.ttf') format('truetype-variations');
    }

    :root {
      /* Light, document-style scheme (brand light scheme + neutrals) */
      --color-bg: #FFFFFF;
      --color-text-primary: #1C1C1E;   /* brand n-ink */
      --color-text-secondary: #5C5C5E;
      --color-text-tertiary: #9A9A9C;
      --color-background-secondary: #F4F4F2;
      --color-border-tertiary: rgba(28, 28, 30, 0.10);

      /* Category colors — brand mint (retainer) + holo lavender (SOW), tuned for white */
      --retainer: #2FA869;
      --retainer-dark: #1F6B45;
      --sow: #6E59C7;
      --sow-dark: #4B3B97;
      --warn: #BA7517;
      --over: #A32D2D;

      --font-display: 'Gelica', 'Times New Roman', serif;
      --font-body: 'Manrope', system-ui, -apple-system, sans-serif;
    }

    * , *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      color: var(--color-text-primary);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .page { max-width: 760px; margin: 0 auto; padding: 40px 28px 72px; }

    /* Header */
    .report-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 6px; }
    .report-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
    .report-range { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }

    /* Year selector */
    .years { display: inline-flex; gap: 2px; background: var(--color-background-secondary); border-radius: 999px; padding: 3px; margin: 10px 0 20px; }
    .years button {
      font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--color-text-secondary);
      background: transparent; border: 0; cursor: pointer; padding: 5px 13px; border-radius: 999px; transition: all .12s ease;
    }
    .years button:hover { color: var(--color-text-primary); }
    .years button[aria-pressed="true"] { background: var(--retainer); color: #fff; }

    /* Disclaimer */
    .disclaimer {
      font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 24px; line-height: 1.6;
      border-left: 2px solid var(--color-border-tertiary); padding-left: 12px;
    }

    /* Summary cards */
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 28px; }
    .summary .card { background: var(--color-background-secondary); border-radius: 8px; padding: 14px 16px; }
    .summary .card .k { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
    .summary .card .v { font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums; }
    .summary .card .s { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
    .v.green { color: var(--retainer); }
    .v.purple { color: var(--sow); }

    /* Overview chart */
    .chart-wrap { position: relative; width: 100%; height: 200px; margin-bottom: 8px; }
    .legend { display: flex; gap: 16px; font-size: 11px; color: var(--color-text-secondary); margin-bottom: 32px; }
    .legend span { display: flex; align-items: center; gap: 5px; }
    .swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

    /* Month blocks */
    .month { border-top: 0.5px solid var(--color-border-tertiary); padding-top: 20px; margin-bottom: 24px; }
    .month-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .month-name { font-size: 13px; font-weight: 600; }
    .month-total { font-size: 11px; color: var(--color-text-secondary); }
    .cat { margin-bottom: 14px; }
    .cat:last-child { margin-bottom: 0; }
    .cat-head { display: flex; justify-content: space-between; margin-bottom: 8px; gap: 12px; }
    .cat-name { font-size: 11px; font-weight: 600; }
    .cat-name.green { color: var(--retainer-dark); }
    .cat-name.purple { color: var(--sow-dark); }
    .cat-meta { font-size: 11px; text-align: right; }
    .row { display: flex; align-items: center; gap: 10px; padding: 4px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .row .name {
      font-size: 12px; color: var(--color-text-secondary); width: 240px; min-width: 240px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .row .hrs { font-size: 12px; color: var(--color-text-primary); min-width: 56px; text-align: right; font-variant-numeric: tabular-nums; }
    .track { flex: 1; height: 5px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; }
    .fill { height: 100%; border-radius: 3px; }
    .empty-note { font-size: 11px; color: var(--color-text-tertiary); font-style: italic; margin: 0 0 8px; }

    /* YTD table */
    .ytd { border-top: 0.5px solid var(--color-border-tertiary); padding-top: 20px; margin-top: 4px; }
    .ytd h3 { font-size: 13px; font-weight: 600; margin: 0 0 14px; font-family: var(--font-body); }
    .ytd-grid { display: grid; grid-template-columns: 1.4fr 1fr 0.9fr 1fr 1fr; font-size: 11px; }
    .ytd-grid > div { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .ytd-grid .h { color: var(--color-text-secondary); font-weight: 600; }
    .ytd-grid .r { text-align: right; font-variant-numeric: tabular-nums; }
    .ytd-grid .b { font-weight: 600; }
    .ytd-grid .tot { border-bottom: 0; }

    /* States + footer */
    .state { text-align: center; padding: 64px 20px; color: var(--color-text-secondary); font-size: 13px; }
    .spinner { width: 30px; height: 30px; border-radius: 50%; border: 3px solid var(--color-border-tertiary); border-top-color: var(--retainer); animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: var(--over); }
    .err code { display: block; margin-top: 10px; color: var(--color-text-tertiary); font-size: 12px; word-break: break-word; }
    .foot { margin-top: 36px; font-size: 11px; color: var(--color-text-tertiary); text-align: center; line-height: 1.7; }
    .foot a { color: var(--retainer-dark); text-decoration: none; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
  <div class="page">
    <div class="report-head">
      <div class="report-title">Moss · Hours Report</div>
      <div class="report-range" id="range"></div>
    </div>
    <div class="years" id="years" role="group" aria-label="Select year"></div>

    <div id="content"></div>
  </div>

  <script>
    var API_BASE = new URLSearchParams(location.search).get('api') || '/api/time';
    var CURRENT_YEAR = new Date().getFullYear();
    var YEAR = parseInt(new URLSearchParams(location.search).get('year')) || CURRENT_YEAR;
    var BUDGET = 50;
    var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var RETAINER = '#2FA869', SOW = '#6E59C7';
    var chart = null;

    function fmtH(h) {
      if (h === null || h === undefined) return '—';
      var hrs = Math.floor(h), mins = Math.round((h - hrs) * 60);
      if (mins === 60) { hrs += 1; mins = 0; }
      if (hrs === 0 && mins === 0) return '0h';
      if (hrs === 0) return mins + 'm';
      if (mins === 0) return hrs + 'h';
      return hrs + 'h ' + mins + 'm';
    }
    function esc(s) {
      return String(s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    function pctColor(pct) { return pct > 100 ? 'var(--over)' : pct > 80 ? 'var(--warn)' : 'var(--retainer)'; }
    function bar(h, max, color) {
      var w = max > 0 ? Math.round((h / max) * 100) : 0;
      return '<div class="track"><div class="fill" style="width:' + w + '%;background:' + color + ';"></div></div>';
    }

    function renderYears() {
      var el = document.getElementById('years');
      var opts = [];
      for (var i = 0; i < 4; i++) opts.push(CURRENT_YEAR - i);
      el.innerHTML = opts.map(function (y) {
        return '<button data-y="' + y + '" aria-pressed="' + (y === YEAR) + '">' + y + '</button>';
      }).join('');
      el.querySelectorAll('button').forEach(function (b) {
        b.addEventListener('click', function () {
          YEAR = parseInt(b.dataset.y);
          renderYears();
          load();
        });
      });
    }

    function load() {
      var content = document.getElementById('content');
      content.innerHTML = '<div class="state"><div class="spinner"></div>Loading ' + YEAR + ' hours…</div>';
      document.getElementById('range').textContent = '';
      if (chart) { chart.destroy(); chart = null; }

      fetch(API_BASE + '?year=' + YEAR)
        .then(function (r) {
          return r.text().then(function (t) {
            if (!r.ok) throw new Error('API ' + r.status + ': ' + t.slice(0, 200));
            return JSON.parse(t);
          });
        })
        .then(render)
        .catch(function (e) {
          content.innerHTML = '<div class="state err">Couldn’t load data.<code>' + esc(e.message) + '</code>' +
            '<div style="margin-top:12px;color:var(--color-text-tertiary);">Confirm <b>CLICKUP_TOKEN</b> is set in Vercel and the API is reachable at <code>' + esc(API_BASE) + '</code>.</div></div>';
        });
    }

    function render(data) {
      BUDGET = data.retainerBudget || 50;
      var months = data.months || [];
      var active = [];
      months.forEach(function (m) { if ((m.retainerHours || 0) + (m.sowHours || 0) > 0) active.push(m.month); });

      var content = document.getElementById('content');
      if (!active.length) {
        document.getElementById('range').textContent = YEAR;
        content.innerHTML = '<div class="state">No tracked Retainer or SOW hours for ' + YEAR + ' yet.</div>';
        return;
      }

      var first = active[0], last = active[active.length - 1];
      document.getElementById('range').textContent =
        MONTH_NAMES[first] + ' – ' + MONTH_NAMES[last] + ' ' + YEAR;

      var retYTD = 0, sowYTD = 0;
      months.forEach(function (m) { retYTD += m.retainerHours || 0; sowYTD += m.sowHours || 0; });
      var range = [];
      for (var i = first; i <= last; i++) range.push(months[i]);

      var html = '';

      // ── Disclaimer ──
      html += '<div class="disclaimer">Hours are pulled live from ClickUp time tracking and grouped by project folder ' +
        '(Moss Creative Retainer and Moss SOWs). Figures are working estimates and may shift as timesheets are updated. ' +
        'Retainer percentages assume a ' + BUDGET + 'h / month budget.</div>';

      // ── Summary cards ──
      html += '<div class="summary">';
      html += card('Retainer used (YTD)', '<span class="v green">' + fmtH(retYTD) + '</span>', 'of ' + BUDGET + 'h/mo budget');
      html += card('Non-retainer SOW (YTD)', '<span class="v purple">' + fmtH(sowYTD) + '</span>', 'outside retainer scope');
      html += card('Total hours (YTD)', '<span class="v">' + fmtH(retYTD + sowYTD) + '</span>', 'all Moss work combined');
      html += card('Retainer budget', '<span class="v">' + BUDGET + 'h</span>', 'per month');
      html += '</div>';

      // ── Overview chart ──
      html += '<div class="chart-wrap"><canvas id="overviewChart" role="img" aria-label="Grouped bar chart of retainer vs SOW hours by month"></canvas></div>';
      html += '<div class="legend">' +
        '<span><span class="swatch" style="background:' + RETAINER + '"></span>Creative retainer</span>' +
        '<span><span class="swatch" style="background:' + SOW + '"></span>Non-retainer (SOW / project work)</span>' +
        '</div>';

      // ── Month blocks ──
      range.forEach(function (m) { html += monthBlock(m); });

      // ── YTD table ──
      html += '<div class="ytd"><h3>Year-to-date summary</h3><div class="ytd-grid">';
      html += '<div class="h">Month</div><div class="h r">Retainer</div><div class="h r">% of ' + BUDGET + 'h</div><div class="h r">Non-retainer</div><div class="h r">Total</div>';
      range.forEach(function (m) {
        var pct = Math.round((m.retainerHours / BUDGET) * 100);
        html += '<div>' + MONTH_NAMES[m.month] + '</div>';
        html += '<div class="r">' + fmtH(m.retainerHours) + '</div>';
        html += '<div class="r" style="color:' + pctColor(pct) + '">' + pct + '%</div>';
        html += '<div class="r">' + fmtH(m.sowHours) + '</div>';
        html += '<div class="r b">' + fmtH(m.retainerHours + m.sowHours) + '</div>';
      });
      html += '<div class="tot b">Total</div>';
      html += '<div class="tot r b" style="color:var(--retainer)">' + fmtH(retYTD) + '</div>';
      html += '<div class="tot r"></div>';
      html += '<div class="tot r b" style="color:var(--sow)">' + fmtH(sowYTD) + '</div>';
      html += '<div class="tot r b">' + fmtH(retYTD + sowYTD) + '</div>';
      html += '</div></div>';

      // ── Footer ──
      var footExtra = data.unmatchedHours > 0
        ? fmtH(data.unmatchedHours) + ' of time tracked for other clients is excluded from this report.<br>'
        : '';
      html += '<div class="foot">' + footExtra + 'Founding Creative · <a href="https://brand.foundingcreative.com">Brand System</a></div>';

      content.innerHTML = html;
      drawChart(range);
    }

    function card(k, v, s) {
      return '<div class="card"><div class="k">' + k + '</div><div class="v">' + v + '</div><div class="s">' + s + '</div></div>';
    }

    function monthBlock(m) {
      var html = '<div class="month"><div class="month-head">';
      html += '<span class="month-name">' + MONTH_NAMES[m.month] + ' ' + YEAR + '</span>';
      html += '<span class="month-total">Total: <strong>' + fmtH(m.retainerHours + m.sowHours) + '</strong></span>';
      html += '</div>';

      // Retainer category
      var pct = Math.round((m.retainerHours / BUDGET) * 100);
      var remaining = BUDGET - m.retainerHours;
      html += '<div class="cat"><div class="cat-head">';
      html += '<span class="cat-name green">Creative retainer</span>';
      html += '<span class="cat-meta" style="color:' + pctColor(pct) + '">' + fmtH(m.retainerHours) + ' used · ' + pct + '% of ' + BUDGET + 'h · ' +
        (remaining >= 0 ? fmtH(remaining) + ' remaining' : fmtH(-remaining) + ' over') + '</span>';
      html += '</div>';
      html += taskRows(m.retainerItems, RETAINER) || '<p class="empty-note">No retainer time tracked this month.</p>';
      html += '</div>';

      // SOW category
      if (m.sowItems && m.sowItems.length) {
        html += '<div class="cat"><div class="cat-head">';
        html += '<span class="cat-name purple">Non-retainer (SOW / project work)</span>';
        html += '<span class="cat-meta" style="color:var(--sow)">' + fmtH(m.sowHours) + ' total</span>';
        html += '</div>';
        html += taskRows(m.sowItems, SOW);
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function taskRows(items, color) {
      if (!items || !items.length) return '';
      var max = items.reduce(function (a, t) { return Math.max(a, t.hours); }, 0);
      return items.map(function (t) {
        return '<div class="row">' +
          '<span class="name" title="' + esc(t.name) + '">' + esc(t.name) + '</span>' +
          bar(t.hours, max, color) +
          '<span class="hrs">' + fmtH(t.hours) + '</span>' +
        '</div>';
      }).join('');
    }

    function drawChart(range) {
      var el = document.getElementById('overviewChart');
      if (!el || typeof Chart === 'undefined') return;
      chart = new Chart(el, {
        type: 'bar',
        data: {
          labels: range.map(function (m) { return MONTH_ABBR[m.month]; }),
          datasets: [
            { label: 'Creative retainer', data: range.map(function (m) { return m.retainerHours; }),
              backgroundColor: RETAINER + 'cc', borderColor: RETAINER, borderWidth: 1, borderRadius: 3 },
            { label: 'Non-retainer (SOW)', data: range.map(function (m) { return m.sowHours; }),
              backgroundColor: SOW + 'cc', borderColor: SOW, borderWidth: 1, borderRadius: 3 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (c) { return c.dataset.label + ': ' + fmtH(c.parsed.y); } } }
          },
          scales: {
            x: { ticks: { autoSkip: false, maxRotation: 0, font: { size: 11 }, color: '#999' }, grid: { display: false }, border: { display: false } },
            y: { ticks: { font: { size: 11 }, color: '#999', callback: function (v) { return v + 'h'; } },
                 grid: { color: 'rgba(128,128,128,0.1)' }, border: { display: false }, beginAtZero: true }
          }
        }
      });
    }

    renderYears();
    load();
  </script>
</body>
</html>
