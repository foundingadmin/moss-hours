<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moss · Hours Report</title>
  <link rel="icon" href="https://brand.foundingcreative.com/favicon.svg" />

  <!-- Founding Creative design-system tokens (fonts, colors, radius, shadows, spacing) -->
  <link rel="stylesheet" href="https://brand.foundingcreative.com/css/tokens.css" />

  <style>
    /* Report-specific styling, layered on the DS dark scheme (default in tokens.css). */
    :root {
      --retainer: var(--mint);                 /* #7EF893 */
      --sow: var(--holo-lavender);             /* #C6A2FF */
      --ok: var(--mint);
      --warn: #F5C26B;
      --over: #FF8A80;
      --surface: rgba(255, 255, 255, 0.045);
      --surface-2: rgba(255, 255, 255, 0.08);
      --line: rgba(255, 255, 255, 0.12);
      --dim: rgba(255, 255, 255, 0.66);
      --dim-2: rgba(255, 255, 255, 0.45);
    }

    body {
      background:
        radial-gradient(1100px 560px at 82% -8%, rgba(126, 248, 147, 0.10), transparent 60%),
        radial-gradient(820px 460px at -10% 6%, rgba(198, 162, 255, 0.08), transparent 55%),
        var(--n-black);
      background-attachment: fixed;
      font-size: 16px;
    }
    .page { max-width: 840px; margin: 0 auto; padding: 56px 28px 90px; }

    /* Header */
    .report-head { display: flex; justify-content: space-between; align-items: baseline; gap: 18px; flex-wrap: wrap; }
    .report-title { font-family: var(--font-display); font-size: clamp(30px, 5vw, 44px); font-weight: 600; letter-spacing: -0.01em; line-height: 1.05; }
    .report-range { font-size: 15px; color: var(--dim); white-space: nowrap; }

    /* Pill selectors (years + month tabs) */
    .pills { display: inline-flex; gap: 3px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-full); padding: 4px; }
    .pills.scroll { display: flex; overflow-x: auto; max-width: 100%; scrollbar-width: none; }
    .pills.scroll::-webkit-scrollbar { display: none; }
    .pill {
      font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--dim);
      background: transparent; border: 0; cursor: pointer; padding: 8px 18px; border-radius: var(--r-full);
      transition: all .14s ease; white-space: nowrap;
    }
    .pill:hover { color: var(--white); }
    .pill[aria-pressed="true"], .pill[aria-selected="true"] { background: var(--mint); color: var(--n-black); }
    .years { margin: 16px 0 26px; }

    /* Disclaimer */
    .disclaimer {
      font-size: 14px; color: var(--dim); margin-bottom: 30px; line-height: 1.7; max-width: 64ch;
      border-left: 2px solid rgba(126, 248, 147, 0.5); padding-left: 16px;
    }

    /* Summary cards */
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 34px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 20px 22px; }
    .card.accent { background: linear-gradient(180deg, rgba(126, 248, 147, 0.14), rgba(126, 248, 147, 0.035)); border-color: rgba(126, 248, 147, 0.32); }
    .card .k { font-size: 14px; font-weight: 600; color: var(--dim); margin-bottom: 8px; }
    .card .v { font-family: var(--font-display); font-size: 36px; font-weight: 600; line-height: 1.05; font-variant-numeric: tabular-nums; }
    .card .s { font-size: 13.5px; color: var(--dim); margin-top: 6px; }
    .v.green { color: var(--retainer); }
    .v.purple { color: var(--sow); }

    /* Section heading */
    .sec-title { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0 0 16px; }

    /* Overview chart */
    .chart-wrap { position: relative; width: 100%; height: 230px; margin-bottom: 14px; }
    .legend { display: flex; gap: 22px; font-size: 14px; color: var(--dim); margin-bottom: 40px; flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 7px; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

    /* Month tabs + detail panel */
    .month-tabs { margin: 0 0 18px; }
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl); padding: 26px 26px 22px; box-shadow: var(--shadow-xl); }
    .panel-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
    .panel-head .mname { font-family: var(--font-display); font-size: 24px; font-weight: 600; }
    .panel-head .mtotal { font-size: 15px; color: var(--dim); }
    .panel-head .mtotal strong { color: var(--white); font-weight: 700; }

    .cat { margin-bottom: 26px; }
    .cat:last-child { margin-bottom: 0; }
    .cat-head { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
    .cat-name { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .cat-name.green { color: var(--retainer); }
    .cat-name.purple { color: var(--sow); }
    .cat-meta { font-size: 14px; font-weight: 600; text-align: right; }
    .row { display: flex; align-items: center; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--line); }
    .row:last-child { border-bottom: 0; }
    .row .name { flex: 1 1 0; min-width: 0; font-size: 15px; font-weight: 500; color: rgba(255, 255, 255, 0.9); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .track { flex: 0 0 150px; height: 7px; background: var(--surface-2); border-radius: var(--r-full); overflow: hidden; }
    .fill { height: 100%; border-radius: var(--r-full); }
    .row .hrs { flex: 0 0 66px; font-size: 15px; font-weight: 600; color: var(--white); text-align: right; font-variant-numeric: tabular-nums; }
    .empty-note { font-size: 14px; color: var(--dim-2); font-style: italic; margin: 0; }
    @media (max-width: 540px) { .track { flex-basis: 90px; } }

    /* YTD table */
    .ytd { margin-top: 44px; }
    .ytd-grid { display: grid; grid-template-columns: 1.4fr 1fr 0.9fr 1fr 1fr; font-size: 14.5px; }
    .ytd-grid > div { padding: 11px 12px; border-bottom: 1px solid var(--line); }
    .ytd-grid .h { color: var(--dim); font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    .ytd-grid .r { text-align: right; font-variant-numeric: tabular-nums; }
    .ytd-grid .b { font-weight: 700; }
    .ytd-grid .tot { border-bottom: 0; border-top: 2px solid var(--surface-2); padding-top: 13px; }

    /* States + footer */
    .state { text-align: center; padding: 80px 20px; color: var(--dim); font-size: 16px; }
    .spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--line); border-top-color: var(--mint); animation: spin 1s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: var(--over); }
    .err code { display: block; margin-top: 12px; color: var(--dim); font-size: 13.5px; word-break: break-word; }
    .foot { margin-top: 44px; font-size: 13.5px; color: var(--dim-2); text-align: center; line-height: 1.8; }
    .foot a { color: var(--mint); text-decoration: none; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
  <div class="page">
    <div class="report-head">
      <div class="report-title">Moss · Hours Report</div>
      <div class="report-range" id="range"></div>
    </div>
    <div class="pills years" id="years" role="group" aria-label="Select year"></div>

    <div id="content"></div>
  </div>

  <script>
    var API_BASE = new URLSearchParams(location.search).get('api') || '/api/time';
    var CURRENT_YEAR = new Date().getFullYear();
    var YEAR = parseInt(new URLSearchParams(location.search).get('year')) || CURRENT_YEAR;
    var YEAR_OPTIONS = [CURRENT_YEAR, CURRENT_YEAR - 1]; // current + previous year only
    var BUDGET = 50;
    var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var MONTH_ABBR = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var RETAINER = '#7EF893', SOW = '#C6A2FF';
    var chart = null;
    var state = { months: [], range: [], selected: null };

    function fmtH(h) {
      if (h === null || h === undefined) return '—';
      var hrs = Math.floor(h), mins = Math.round((h - hrs) * 60);
      if (mins === 60) { hrs += 1; mins = 0; }
      if (hrs === 0 && mins === 0) return '0h';
      if (hrs === 0) return mins + 'm';
      if (mins === 0) return hrs + 'h';
      return hrs + 'h ' + mins + 'm';
    }
    function esc(s) {
      return String(s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }
    function pctColor(pct) { return pct > 100 ? 'var(--over)' : pct > 80 ? 'var(--warn)' : 'var(--ok)'; }
    function bar(h, max, color) {
      var w = max > 0 ? Math.round((h / max) * 100) : 0;
      return '<div class="track"><div class="fill" style="width:' + w + '%;background:' + color + ';"></div></div>';
    }

    function renderYears() {
      var el = document.getElementById('years');
      el.innerHTML = YEAR_OPTIONS.map(function (y) {
        return '<button class="pill" data-y="' + y + '" aria-pressed="' + (y === YEAR) + '">' + y + '</button>';
      }).join('');
      el.querySelectorAll('button').forEach(function (b) {
        b.addEventListener('click', function () {
          YEAR = parseInt(b.dataset.y);
          renderYears();
          load();
        });
      });
    }

    function load() {
      var content = document.getElementById('content');
      content.innerHTML = '<div class="state"><div class="spinner"></div>Loading ' + YEAR + ' hours…</div>';
      document.getElementById('range').textContent = '';
      if (chart) { chart.destroy(); chart = null; }

      fetch(API_BASE + '?year=' + YEAR)
        .then(function (r) {
          return r.text().then(function (t) {
            if (!r.ok) throw new Error('API ' + r.status + ': ' + t.slice(0, 200));
            return JSON.parse(t);
          });
        })
        .then(render)
        .catch(function (e) {
          content.innerHTML = '<div class="state err">Couldn’t load data.<code>' + esc(e.message) + '</code>' +
            '<div style="margin-top:12px;color:var(--dim);">Confirm <b>CLICKUP_TOKEN</b> is set in Vercel and the API is reachable at <code>' + esc(API_BASE) + '</code>.</div></div>';
        });
    }

    function render(data) {
      BUDGET = data.retainerBudget || 50;
      var months = data.months || [];
      var active = [];
      months.forEach(function (m) { if ((m.retainerHours || 0) + (m.sowHours || 0) > 0) active.push(m.month); });

      var content = document.getElementById('content');
      if (!active.length) {
        document.getElementById('range').textContent = YEAR;
        content.innerHTML = '<div class="state">No tracked Retainer or SOW hours for ' + YEAR + ' yet.</div>';
        return;
      }

      var first = active[0], last = active[active.length - 1];
      document.getElementById('range').textContent = MONTH_NAMES[first] + ' – ' + MONTH_NAMES[last] + ' ' + YEAR;

      var retYTD = 0, sowYTD = 0;
      months.forEach(function (m) { retYTD += m.retainerHours || 0; sowYTD += m.sowHours || 0; });

      var range = [];
      for (var i = first; i <= last; i++) range.push(months[i]);
      state.months = months;
      state.range = range;
      state.selected = last; // default to the most recent month with data

      var html = '';

      html += '<div class="disclaimer">Hours are pulled live from ClickUp time tracking and grouped by project folder ' +
        '(Moss Creative Retainer and Moss SOWs). Figures are working estimates and may shift as timesheets are updated. ' +
        'Retainer percentages assume a ' + BUDGET + 'h / month budget.</div>';

      html += '<div class="summary">';
      html += card('Retainer used (YTD)', '<span class="v green">' + fmtH(retYTD) + '</span>', 'of ' + BUDGET + 'h/mo budget', true);
      html += card('Non-retainer SOW (YTD)', '<span class="v purple">' + fmtH(sowYTD) + '</span>', 'outside retainer scope', false);
      html += card('Total hours (YTD)', '<span class="v">' + fmtH(retYTD + sowYTD) + '</span>', 'all Moss work combined', false);
      html += card('Retainer budget', '<span class="v">' + BUDGET + 'h</span>', 'per month', false);
      html += '</div>';

      html += '<h2 class="sec-title">Monthly overview</h2>';
      html += '<div class="chart-wrap"><canvas id="overviewChart" role="img" aria-label="Grouped bar chart of retainer vs SOW hours by month"></canvas></div>';
      html += '<div class="legend">' +
        '<span><span class="swatch" style="background:' + RETAINER + '"></span>Creative retainer</span>' +
        '<span><span class="swatch" style="background:' + SOW + '"></span>Non-retainer (SOW / project work)</span>' +
        '</div>';

      // Month tabs + detail panel
      html += '<h2 class="sec-title">By month</h2>';
      html += '<div class="pills scroll month-tabs" id="monthTabs" role="tablist" aria-label="Select month"></div>';
      html += '<div class="panel" id="monthPanel" role="tabpanel"></div>';

      // YTD table
      html += '<div class="ytd"><h2 class="sec-title">Year-to-date summary</h2><div class="ytd-grid">';
      html += '<div class="h">Month</div><div class="h r">Retainer</div><div class="h r">% of ' + BUDGET + 'h</div><div class="h r">Non-retainer</div><div class="h r">Total</div>';
      range.forEach(function (m) {
        var pct = Math.round((m.retainerHours / BUDGET) * 100);
        html += '<div>' + MONTH_NAMES[m.month] + '</div>';
        html += '<div class="r">' + fmtH(m.retainerHours) + '</div>';
        html += '<div class="r" style="color:' + pctColor(pct) + '">' + pct + '%</div>';
        html += '<div class="r">' + fmtH(m.sowHours) + '</div>';
        html += '<div class="r b">' + fmtH(m.retainerHours + m.sowHours) + '</div>';
      });
      html += '<div class="tot b">Total</div>';
      html += '<div class="tot r b" style="color:var(--retainer)">' + fmtH(retYTD) + '</div>';
      html += '<div class="tot r"></div>';
      html += '<div class="tot r b" style="color:var(--sow)">' + fmtH(sowYTD) + '</div>';
      html += '<div class="tot r b">' + fmtH(retYTD + sowYTD) + '</div>';
      html += '</div></div>';

      var footExtra = data.unmatchedHours > 0
        ? fmtH(data.unmatchedHours) + ' of time tracked for other clients is excluded from this report.<br>'
        : '';
      html += '<div class="foot">' + footExtra + 'Founding Creative · <a href="https://brand.foundingcreative.com">Brand System</a></div>';

      content.innerHTML = html;
      renderMonthTabs();
      renderMonthPanel();
      drawChart(range);
    }

    function card(k, v, s, accent) {
      return '<div class="card' + (accent ? ' accent' : '') + '"><div class="k">' + k + '</div><div class="v">' + v + '</div><div class="s">' + s + '</div></div>';
    }

    function renderMonthTabs() {
      var el = document.getElementById('monthTabs');
      el.innerHTML = state.range.map(function (m) {
        return '<button class="pill" role="tab" data-m="' + m.month + '" aria-selected="' + (m.month === state.selected) + '">' + MONTH_ABBR[m.month] + '</button>';
      }).join('');
      el.querySelectorAll('button').forEach(function (b) {
        b.addEventListener('click', function () {
          state.selected = parseInt(b.dataset.m);
          el.querySelectorAll('button').forEach(function (x) { x.setAttribute('aria-selected', x === b); });
          renderMonthPanel();
        });
      });
    }

    function renderMonthPanel() {
      var m = state.months[state.selected];
      var panel = document.getElementById('monthPanel');
      var html = '<div class="panel-head">';
      html += '<span class="mname">' + MONTH_NAMES[m.month] + ' ' + YEAR + '</span>';
      html += '<span class="mtotal">Total: <strong>' + fmtH(m.retainerHours + m.sowHours) + '</strong></span>';
      html += '</div>';

      var pct = Math.round((m.retainerHours / BUDGET) * 100);
      var remaining = BUDGET - m.retainerHours;
      html += '<div class="cat"><div class="cat-head">';
      html += '<span class="cat-name green"><span class="swatch" style="background:' + RETAINER + '"></span>Creative retainer</span>';
      html += '<span class="cat-meta" style="color:' + pctColor(pct) + '">' + fmtH(m.retainerHours) + ' used · ' + pct + '% of ' + BUDGET + 'h · ' +
        (remaining >= 0 ? fmtH(remaining) + ' remaining' : fmtH(-remaining) + ' over') + '</span>';
      html += '</div>';
      html += taskRows(m.retainerItems, RETAINER) || '<p class="empty-note">No retainer time tracked this month.</p>';
      html += '</div>';

      html += '<div class="cat"><div class="cat-head">';
      html += '<span class="cat-name purple"><span class="swatch" style="background:' + SOW + '"></span>Non-retainer (SOW / project work)</span>';
      html += '<span class="cat-meta" style="color:var(--sow)">' + fmtH(m.sowHours) + ' total</span>';
      html += '</div>';
      html += taskRows(m.sowItems, SOW) || '<p class="empty-note">No SOW / project time tracked this month.</p>';
      html += '</div>';

      panel.innerHTML = html;
    }

    function taskRows(items, color) {
      if (!items || !items.length) return '';
      var max = items.reduce(function (a, t) { return Math.max(a, t.hours); }, 0);
      return items.map(function (t) {
        return '<div class="row">' +
          '<span class="name" title="' + esc(t.name) + '">' + esc(t.name) + '</span>' +
          bar(t.hours, max, color) +
          '<span class="hrs">' + fmtH(t.hours) + '</span>' +
        '</div>';
      }).join('');
    }

    function drawChart(range) {
      var el = document.getElementById('overviewChart');
      if (!el || typeof Chart === 'undefined') return;
      chart = new Chart(el, {
        type: 'bar',
        data: {
          labels: range.map(function (m) { return MONTH_ABBR[m.month]; }),
          datasets: [
            { label: 'Creative retainer', data: range.map(function (m) { return m.retainerHours; }),
              backgroundColor: RETAINER + 'd9', borderColor: RETAINER, borderWidth: 1, borderRadius: 4 },
            { label: 'Non-retainer (SOW)', data: range.map(function (m) { return m.sowHours; }),
              backgroundColor: SOW + 'd9', borderColor: SOW, borderWidth: 1, borderRadius: 4 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: function (c) { return c.dataset.label + ': ' + fmtH(c.parsed.y); } } }
          },
          scales: {
            x: { ticks: { autoSkip: false, maxRotation: 0, font: { size: 13 }, color: 'rgba(255,255,255,0.62)' }, grid: { display: false }, border: { display: false } },
            y: { ticks: { font: { size: 13 }, color: 'rgba(255,255,255,0.62)', callback: function (v) { return v + 'h'; } },
                 grid: { color: 'rgba(255,255,255,0.09)' }, border: { display: false }, beginAtZero: true }
          }
        }
      });
    }

    renderYears();
    load();
  </script>
</body>
</html>
